version: '3.8'

services:
  postgres:
    image: 'postgres:15-alpine'
    container_name: megacrm-postgres
    environment:
      POSTGRES_DB: megacrm
      POSTGRES_USER: megacrm_user
      POSTGRES_PASSWORD: megacrm_secure_password_123
    volumes:
      - 'postgres_data_v3:/var/lib/postgresql/data'
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -U megacrm_user -d megacrm'
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: 'redis:7-alpine'
    container_name: megacrm-redis
    volumes:
      - 'redis_data:/data'
    command: 'redis-server --appendonly yes'
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: 'https://github.com/callegarim/CRM.git#main:backend'
      dockerfile: Dockerfile
    image: megacrm-backend:latest
    pull_policy: never
    container_name: megacrm-backend
    labels:
      - "coolify.managed=true"
      - "coolify.zproxy.fqdn=http://api-crm.megaacessoriosautomotivos.com.br:3001"
    ports:
      - '3001:3001'
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://megacrm_user:megacrm_secure_password_123@postgres:5432/megacrm
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_WEBHOOK_SECRET=${EVOLUTION_WEBHOOK_SECRET}
      - EVOLUTION_INSTANCE=${EVOLUTION_INSTANCE:-mega-whatsapp}
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data_v3: null
  redis_data: null
